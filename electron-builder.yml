appId: com.zmobariz.bulk-uploader-for-figshare
productName: Bulk Uploader for Figshare
asar: false
directories:
  output: dist
  buildResources: build
win:
  target:
    - portable
    - nsis
portable:
  artifactName: "BulkUploaderForFigshare-${version}-portable-win.${ext}"
nsis:
  oneClick: true
  perMachine: false
  allowElevation: false
  artifactName: "BulkUploaderForFigshare-${version}-setup-win.${ext}"
mac:
  target: dmg
  category: public.app-category.productivity
  artifactName: "BulkUploaderForFigshare-${version}-mac.${ext}"
linux:
  target: AppImage
  category: Science
  artifactName: "BulkUploaderForFigshare-${version}-linux.${ext}"
publish:
  provider: github
  owner: zmobariz
  repo: bulk-uploader-for-figshare
