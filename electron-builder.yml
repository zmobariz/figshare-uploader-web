appId: com.zmobariz.figshare-uploader-web
productName: Figshare Bulk Uploader
asar: false
directories:
  output: dist
  buildResources: build
win:
  target:
    - portable
    - nsis
portable:
  artifactName: "FigshareBulkUploader-${version}-portable-win.${ext}"
nsis:
  oneClick: true
  perMachine: false
  allowElevation: false
  artifactName: "FigshareBulkUploader-${version}-setup-win.${ext}"
mac:
  target: dmg
  category: public.app-category.productivity
  artifactName: "FigshareBulkUploader-${version}-mac.${ext}"
linux:
  target: AppImage
  category: Science
  artifactName: "FigshareBulkUploader-${version}-linux.${ext}"
publish:
  provider: github
  owner: zmobariz
  repo: figshare-uploader-web
