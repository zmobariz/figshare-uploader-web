version: 2
updates:
  # Application + build dependencies (npm). Grouped into one weekly PR to reduce noise.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns:
          - "*"
  # Keep the GitHub Actions used by the release workflow current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
