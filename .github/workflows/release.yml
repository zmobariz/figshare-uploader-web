name: Build desktop apps
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - run: npm install
      - name: Build (no publish)
        run: npx electron-builder --publish never
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staged
          shopt -s nullglob
          for f in dist/*.exe dist/*.dmg dist/*.AppImage dist/*.zip dist/*.yml dist/*.blockmap; do cp "$f" staged/; done
          ls -la dist; ls -la staged
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: app-${{ matrix.os }}
          path: staged/*
          if-no-files-found: error
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dl
      - name: Collect + checksums
        shell: bash
        run: |
          mkdir -p release
          find dl -type f -exec cp -f {} release/ \;
          cd release
          sha256sum * > SHA256SUMS.txt
          echo "==== files ===="; ls -la; echo "==== checksums ===="; cat SHA256SUMS.txt
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Sign checksums (keyless)
        shell: bash
        run: |
          cd release
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.txt.sig \
            --output-certificate SHA256SUMS.txt.pem \
            SHA256SUMS.txt
      - name: Publish single release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" release/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Bulk Uploader for Figshare ${GITHUB_REF_NAME}" \
            --notes "Desktop apps for Windows, macOS and Linux - no admin rights needed. Verify with SHA256SUMS.txt (also signed via Sigstore cosign: SHA256SUMS.txt.sig + .pem). Apps are unsigned binaries; first launch: Windows -> More info -> Run anyway, macOS -> right-click -> Open. See docs/DEPLOYMENT-AND-SECURITY.md. From v2.1.0 the apps show update notifications; the Windows installer and Linux AppImage can auto-update (disable with NO_UPDATE_CHECK=1)." \
          || gh release upload "${GITHUB_REF_NAME}" release/* --clobber --repo "${GITHUB_REPOSITORY}"
