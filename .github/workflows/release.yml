name: Build desktop apps
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build (no publish)
        run: npx electron-builder --publish never
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p staged
          shopt -s nullglob
          for f in dist/*.exe dist/*.dmg dist/*.AppImage dist/*.zip; do cp "$f" staged/; done
          ls -la staged
      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: staged/*
          if-no-files-found: error
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dl
      - name: Collect + checksums
        shell: bash
        run: |
          mkdir -p release
          find dl -type f -exec cp -f {} release/ \;
          cd release
          sha256sum * > SHA256SUMS.txt
          echo "==== files ===="; ls -la; echo "==== checksums ===="; cat SHA256SUMS.txt
      - name: Publish single release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" release/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Figshare Bulk Uploader ${GITHUB_REF_NAME}" \
            --notes "Desktop apps for Windows, macOS and Linux — no admin rights needed. Verify downloads against SHA256SUMS.txt. Apps are unsigned; first launch: Windows -> More info -> Run anyway, macOS -> right-click -> Open. See docs/DEPLOYMENT-AND-SECURITY.md." \
          || gh release upload "${GITHUB_REF_NAME}" release/* --clobber --repo "${GITHUB_REPOSITORY}"
